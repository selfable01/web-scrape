name: Hourly Momo Scrape

on:
  schedule:
    # Runs every 15 minutes. Most runs just check the DB and exit instantly
    # (no browser launch) if no users are due. Only scrapes when needed.
    - cron: "*/15 * * * *"
  workflow_dispatch:
    # Manual trigger from GitHub UI or API (e.g., "立即爬取" button)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install playwright playwright-stealth psycopg2-binary

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Check schedule and scrape for due users
        run: python scraper.py --check-schedule
