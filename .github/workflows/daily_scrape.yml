name: Hourly Momo Scrape

on:
  schedule:
    # Backup: runs every 30 min in case external trigger misses.
    - cron: "*/30 * * * *"
  workflow_dispatch:
    # Triggered by cron-job.org every 5 min, or manually from UI / "立即爬取" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install playwright playwright-stealth psycopg2-binary

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Check schedule and scrape for due users
        run: python scraper.py --check-schedule
