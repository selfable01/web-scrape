name: Hourly Momo Scrape

on:
  schedule:
    - cron: "0 * * * *"   # Every hour, on the hour (UTC)
  workflow_dispatch:       # Allow manual trigger from GitHub UI or API

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install playwright playwright-stealth psycopg2-binary

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Check schedule and scrape for due users
        run: python scraper.py --check-schedule
