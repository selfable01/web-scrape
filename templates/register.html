<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>註冊 — momo 價格追蹤器</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg:#0f1115; --panel:#161a22; --line:#262c39; --text:#e6e8ee;
    --muted:#8a93a6; --accent:#3b82f6; --up:#ff5a5f; --down:#22c55e;
  }
  * { box-sizing: border-box }
  html,body { background:var(--bg); color:var(--text); margin:0;
    font: 14px/1.5 -apple-system, "PingFang TC", "Microsoft JhengHei",
          "Noto Sans CJK TC", sans-serif; }
  .wrap { max-width:400px; margin:80px auto; padding:0 24px }
  h1 { font-size:22px; margin:0 0 8px; font-weight:600 }
  p.sub { color:var(--muted); margin:0 0 28px; font-size:13px }
  .card { background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:28px }
  label { display:block; font-size:13px; color:var(--muted); margin-bottom:4px }
  input[type=text], input[type=email], input[type=password] {
    width:100%; padding:10px 12px; border:1px solid var(--line);
    border-radius:8px; background:#1e222b; color:var(--text);
    font-size:14px; margin-bottom:16px; outline:none;
  }
  input:focus { border-color:var(--accent) }
  button, .btn {
    display:block; width:100%; padding:10px; background:var(--accent); color:#fff;
    border:none; border-radius:8px; font-size:14px; font-weight:600;
    cursor:pointer; transition: opacity .15s; text-align:center; text-decoration:none;
  }
  button:hover, .btn:hover { opacity:.85 }
  .btn-outline {
    background:transparent; border:1px solid var(--line); color:var(--text);
    margin-top:12px;
  }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent) }
  .flash { padding:10px 14px; border-radius:8px; font-size:13px; margin-bottom:16px }
  .flash.error { background:rgba(255,90,95,.12); color:var(--up) }
  .flash.success { background:rgba(34,197,94,.12); color:var(--down) }
  .link { text-align:center; margin-top:20px; font-size:13px }
  .link a { color:var(--accent); text-decoration:none }
  .hint { color:var(--muted); font-size:11px; margin-top:-12px; margin-bottom:16px }
  .post-register { text-align:center; margin-top:24px }
</style>
</head>
<body>
<div class="wrap">
  {% if registered %}
    <h1>註冊成功！</h1>
    <p class="sub">歡迎加入 momo 價格追蹤器</p>
    <div class="card" style="text-align:center">
      <p style="margin:0 0 16px; font-size:15px">您的帳號已建立完成。</p>
      <a class="btn" href="/">前往首頁</a>
      <a class="btn btn-outline" href="/settings">設定爬蟲排程</a>
    </div>
  {% else %}
    <h1>建立帳號</h1>
    <p class="sub">momo 價格追蹤器</p>
    <div class="card">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for cat, msg in messages %}
          <div class="flash {{ cat }}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="post">
        <label for="username">使用者名稱</label>
        <input type="text" id="username" name="username" required autofocus>
        <label for="email">電子郵件</label>
        <input type="email" id="email" name="email" required>
        <label for="password">密碼</label>
        <input type="password" id="password" name="password" required>
        <div class="hint">至少 6 個字元</div>
        <button type="submit">建立帳號</button>
      </form>
    </div>
    <div class="link">已經有帳號了？ <a href="/login">登入</a></div>
  {% endif %}
</div>
</body>
</html>
