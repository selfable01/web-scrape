<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>{{ product_name }} · 價格走勢</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg:#0f1115; --panel:#161a22; --line:#262c39; --text:#e6e8ee;
    --muted:#8a93a6; --up:#ff5a5f; --down:#22c55e; --accent:#3b82f6;
  }
  * { box-sizing: border-box }
  html,body { background:var(--bg); color:var(--text); margin:0;
    font: 14px/1.5 -apple-system, "PingFang TC", "Microsoft JhengHei",
          "Noto Sans CJK TC", sans-serif; }
  header { padding:18px 32px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px }
  header a { color:var(--accent); text-decoration:none; font-size:13px }
  main { padding:24px 32px; max-width:1100px; margin:0 auto }
  h1 { font-size:18px; margin:0 0 6px; line-height:1.4 }
  .meta { color:var(--muted); font-size:13px; margin-bottom:18px }
  .stats { display:flex; gap:24px; flex-wrap:wrap; margin-bottom:20px }
  .stat { background:var(--panel); border:1px solid var(--line);
    border-radius:10px; padding:12px 16px; min-width:140px }
  .stat .label { color:var(--muted); font-size:12px;
    letter-spacing:.05em }
  .stat .val { font-size:20px; font-weight:700; margin-top:3px }
  .chart-wrap { background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:20px; margin-bottom:18px }
  .ranges { display:flex; gap:8px; margin-bottom:14px }
  .ranges a {
    padding:6px 12px; border:1px solid var(--line); border-radius:6px;
    color:var(--muted); text-decoration:none; font-size:12px; font-weight:600
  }
  .ranges a.active { background:var(--accent); color:white; border-color:var(--accent) }
  table { width:100%; border-collapse:collapse; margin-top:8px }
  th, td { text-align:left; padding:8px 12px; border-bottom:1px solid var(--line); font-size:13px }
  th { color:var(--muted); font-weight:500; font-size:12px }
  td.num { text-align:right; font-variant-numeric: tabular-nums }
</style>
</head>
<body>
<header>
  <a href="/">返回首頁</a>
</header>

<main>
  <h1>{{ product_name }}</h1>
  <div class="meta">
    識別碼 <code>{{ unique_key[:8] }}</code>
  </div>

  <div class="stats">
    <div class="stat"><div class="label">最新價格</div><div class="val" id="s-latest">—</div></div>
    <div class="stat"><div class="label">最低（{{ days }}天）</div><div class="val" id="s-low">—</div></div>
    <div class="stat"><div class="label">最高（{{ days }}天）</div><div class="val" id="s-high">—</div></div>
    <div class="stat"><div class="label">變動（{{ days }}天）</div><div class="val" id="s-change">—</div></div>
    {% if original_price %}
    <div class="stat"><div class="label">定價</div>
      <div class="val">NT${{ "{:,}".format(original_price) }}</div></div>
    {% endif %}
  </div>

  <div class="chart-wrap">
    <div class="ranges">
      {% for d in [7, 14, 30, 90] %}
        <a href="?days={{ d }}" class="{{ 'active' if d == days else '' }}">{{ d }}天</a>
      {% endfor %}
    </div>
    <svg id="chart" viewBox="0 0 900 360" width="100%" height="360"></svg>
  </div>

  <div class="chart-wrap">
    <table>
      <thead><tr><th>日期</th><th class="num">價格</th><th class="num">與前日比較</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
</main>

<script>
const history = {{ history|tojson }};

const prices = history.map(h => h.price);
const lo = Math.min(...prices), hi = Math.max(...prices);
const latest = prices.at(-1), first = prices[0];
const delta = latest - first;
const pct = first ? (delta / first * 100) : 0;
const fmt = n => 'NT$' + n.toLocaleString();
document.getElementById('s-latest').textContent = fmt(latest);
document.getElementById('s-low').textContent    = fmt(lo);
document.getElementById('s-high').textContent   = fmt(hi);
const cEl = document.getElementById('s-change');
cEl.textContent = (delta > 0 ? '+' : '') + fmt(delta).replace('NT$','NT$') +
                  ` (${pct >= 0 ? '+' : ''}${pct.toFixed(1)}%)`;
cEl.style.color = delta < 0 ? 'var(--down)' : (delta > 0 ? 'var(--up)' : 'inherit');

(function drawChart() {
  const svg = document.getElementById('chart');
  const W = 900, H = 360, padL = 70, padR = 20, padT = 20, padB = 40;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const span = (hi - lo) || 1;
  const yMin = lo - span * 0.1, yMax = hi + span * 0.1;
  const xs = i => padL + innerW * (i / Math.max(1, history.length - 1));
  const ys = v => padT + innerH * (1 - (v - yMin) / (yMax - yMin));

  let g = '';
  for (let k = 0; k <= 4; k++) {
    const v = yMin + (yMax - yMin) * (k / 4);
    const y = ys(v);
    g += `<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}"
                stroke="#262c39" stroke-dasharray="2,3" />`;
    g += `<text x="${padL-8}" y="${y+4}" text-anchor="end"
                fill="#8a93a6" font-size="11">${Math.round(v).toLocaleString()}</text>`;
  }

  const step = Math.max(1, Math.ceil(history.length / 8));
  for (let i = 0; i < history.length; i += step) {
    g += `<text x="${xs(i)}" y="${H-padB+18}" text-anchor="middle"
                fill="#8a93a6" font-size="11">${history[i].date.slice(5)}</text>`;
  }

  const color = delta < 0 ? '#22c55e' : (delta > 0 ? '#ff5a5f' : '#94a3b8');
  const linePath = history.map((h,i) =>
    (i?'L':'M') + xs(i).toFixed(1) + ',' + ys(h.price).toFixed(1)).join(' ');
  const areaPath = linePath + ` L${xs(history.length-1)},${ys(yMin)} L${xs(0)},${ys(yMin)} Z`;
  g += `<path d="${areaPath}" fill="${color}" fill-opacity="0.10" />`;
  g += `<path d="${linePath}" fill="none" stroke="${color}" stroke-width="2" />`;

  history.forEach((h,i) => {
    g += `<circle cx="${xs(i)}" cy="${ys(h.price)}" r="3.5"
                  fill="#0f1115" stroke="${color}" stroke-width="2">
            <title>${h.date}: NT$${h.price.toLocaleString()}</title>
          </circle>`;
  });

  g += `<text x="${xs(history.length-1)+8}" y="${ys(latest)+4}"
              fill="${color}" font-size="12" font-weight="700">${fmt(latest)}</text>`;

  svg.innerHTML = g;
})();

const tbl = document.getElementById('tbl');
history.slice().reverse().forEach((h, idx, arr) => {
  const prev = arr[idx + 1];
  const d = prev ? h.price - prev.price : 0;
  const col = d < 0 ? 'var(--down)' : (d > 0 ? 'var(--up)' : 'var(--muted)');
  const sign = d > 0 ? '+' : '';
  tbl.insertAdjacentHTML('beforeend',
    `<tr><td>${h.date}</td>
         <td class="num">NT$${h.price.toLocaleString()}</td>
         <td class="num" style="color:${col}">${prev ? sign + d.toLocaleString() : '—'}</td>
     </tr>`);
});
</script>
</body>
</html>
